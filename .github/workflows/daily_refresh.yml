name: Daily Data Refresh

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Google credentials
        run: |
          echo "${{ secrets.GOOGLE_CREDS_B64 }}" | base64 -d > google_creds.json

      - name: Debug Google credentials file
        run: |
          head -c 200 google_creds.json
          echo ""
          file google_creds.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - run: python download_data.py

      - run: python generate_insights.py

      - name: Upload to Google Sheets
        run: |
          python upload_to_gsheets.py